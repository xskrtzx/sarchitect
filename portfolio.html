<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S Architect - Portfolio Track</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #f5f5f5;
            font-family: 'Segoe UI', sans-serif;
        }
        /* Navigasi Melayang Atas */
        .nav-bar {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; gap: 40px;
        }
        .nav-bar a {
            font-size: 11px; letter-spacing: 3px; text-decoration: none;
            color: #999; text-transform: uppercase; transition: color 0.3s;
        }
        .nav-bar a.active, .nav-bar a:hover { color: #111; font-weight: bold; }

        /* Ticker Koordinat */
        .blueprint-coordinates {
            position: absolute; top: 80px; left: 0; width: 100%;
            font-family: 'Courier New', monospace; font-size: 11px;
            color: rgba(0, 0, 0, 0.2); white-space: nowrap; overflow: hidden; letter-spacing: 2px;
        }
        /* Jalur Track Horizontal */
        .horizontal-track {
            display: flex; align-items: center; height: 100%;
            padding-left: 15%; padding-right: 25%; gap: 180px;
            cursor: grab; will-change: transform;
        }
        .project-card { flex-shrink: 0; width: 420px; will-change: transform; }
        .image-wrapper { width: 100%; overflow: hidden; background-color: #e0e0e0; }
        .project-card img {
            width: 100%; height: 550px; object-fit: cover;
            filter: grayscale(100%); transition: filter 0.6s ease;
        }
        .project-card:hover img { filter: grayscale(0%); }
        
        /* Kliping Dinding Pasca-Modern */
        .skew-layout-1 .image-wrapper { clip-path: polygon(0 8%, 100% 0, 92% 100%, 0% 94%); }
        .skew-layout-2 .image-wrapper { clip-path: polygon(8% 0, 100% 4%, 100% 92%, 0 100%); }
        .skew-layout-3 .image-wrapper { clip-path: polygon(0 0, 100% 12%, 88% 100%, 12% 88%); }

        .project-meta { margin-top: 20px; }
        .project-meta h3 { font-size: 14px; letter-spacing: 2px; color: #111; margin: 0; }
        .project-meta p { font-size: 12px; color: #666; margin: 5px 0 0 0; }
        
        /* Petunjuk Geser Ujung */
        .drag-notice {
            position: absolute; bottom: 5%; right: 5%; font-size: 10px;
            letter-spacing: 2px; color: #999; text-transform: uppercase;
        }
    </style>
    <!-- Meload GSAP untuk kelancaran paralaks -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/gsap.min.js"></script>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html">Home</a>
        <a href="portfolio.html" class="active">Portfolio</a>
        <a href="profile.html">Profile</a>
    </div>

    <div class="blueprint-coordinates" id="ticker">LAT: -7.9839° S / LONG: 112.6214° E // SCALE 1:50 // PROJECT REF: S-INF // </div>
    
    <div class="horizontal-track" id="track">
        <div class="project-card skew-layout-1" data-speed="0.06">
            <div class="image-wrapper"><img src="https://unsplash.com" alt="P1"></div>
            <div class="project-meta"><h3>01 // PAVILION S-INFINITY</h3><p>Malang, Indonesia</p></div>
        </div>
        <div class="project-card skew-layout-2" data-speed="-0.04">
            <div class="image-wrapper"><img src="https://unsplash.com" alt="P2"></div>
            <div class="project-meta"><h3>02 // RESIDENCE SETYOWIBOWO</h3><p>Surabaya, Indonesia</p></div>
        </div>
        <div class="project-card skew-layout-3" data-speed="0.08">
            <div class="image-wrapper"><img src="https://unsplash.com" alt="P3"></div>
            <div class="project-meta"><h3>03 // THE WIREFRAME MONOLITH</h3><p>Jakarta, Indonesia</p></div>
        </div>
    </div>

    <div class="drag-notice">Tarik layar ke kiri untuk profil →</div>

    <script>
        let currentX = 0, targetX = 0, isDragging = false, startX = 0;
        const track = document.getElementById('track');
        const cards = document.querySelectorAll('.project-card');

        // Ticker Berjalan
        setInterval(() => {
            let t = document.getElementById('ticker');
            t.innerText = t.innerText.substring(1) + t.innerText.substring(0, 1);
        }, 50);

        // Dragging System
        window.addEventListener('mousedown', (e) => { isDragging = true; startX = e.clientX - currentX; track.style.cursor = 'grabbing'; });
        window.addEventListener('mouseup', () => { isDragging = false; track.style.cursor = 'grab'; });
        
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) {
                // Efek Paralaks Kursor Asimetris
                const mX = (e.clientX / window.innerWidth) - 0.5;
                const mY = (e.clientY / window.innerHeight) - 0.5;
                cards.forEach(card => {
                    const sp = parseFloat(card.getAttribute('data-speed'));
                    gsap.to(card, { x: currentX + (mX * sp * 700), y: mY * sp * 350, rotation: mX * sp * 10, duration: 0.6 });
                });
                return;
            }
            targetX = e.clientX - startX;
            targetX = Math.min(0, Math.max(targetX, -1300)); // Batas seret
            currentX = targetX;
            gsap.to(track, { x: currentX, duration: 0.5, ease: "power2.out" });

            // JIKA DISERET SAMPAI UJUNG KANAN, PINDAH KE PROFILE.HTML
            if (currentX <= -1250) { window.location.href = "profile.html"; }
        });
    </script>
</body>
</html>
