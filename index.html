    <title>S Architect - CSS 3D Portal</title>

            <div class="layer l4"><svg viewBox="0 0 100 150"><path d="M80,30 C80,10 20,10 20,45 C20,80 80,70 80,105 C80,140 20,140 20,120"/></svg></div>
            <div class="layer l5"><svg viewBox="0 0 100 150"><path d="M80,30 C80,10 20,10 20,45 C20,80 80,70 80,105 C80,140 20,140 20,120"/></svg></div>
        </div>
    </div>

    <div class="instruction" id="text">Klik Logo S untuk Masuk</div>
